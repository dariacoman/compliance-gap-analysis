# config.toml — single source of truth for the simplified path's tunables.
#
# Three override mechanisms with clear precedence:
#   1. Environment variables (highest)        — for env-specific overrides (Colab vs local)
#   2. CONFIG dict mutation (session-scoped)  — for cell-driven experimentation
#   3. This file (project default)            — for committed defaults
#
# Hot-mutable in code (no restart needed): retrieval top-k, ranking strategy,
# reranker confidence thresholds, generation params, output toggles.
#
# Restart-required: llm.model_id, embedding.model_id, reranker.model_id, paths.
# These are resolved once at module import time. Use environment variables
# (MODEL_ID, EMBED_MODEL_ID) to set them per-session.

[paths]
corpus_manifest          = "corpus/manifest.json"
embeddings_bge_cache     = "embeddings_bge"        # BGE-large embeddings cache (simplified path)
embeddings_minilm_cache  = "embeddings"            # MiniLM cache (chain-side; cleanup-deferred)
llm_cache_simplified     = "llm_cache_simplified"  # DiskCache for LLM responses

[embedding]
# Override via EMBED_MODEL_ID env var. Restart required.
model_id     = "BAAI/bge-large-en-v1.5"
query_prefix = "Represent this sentence for searching relevant passages: "

[retrieval]
top_k_reg            = 5    # regulation chunks passed to LLM
top_k_dep            = 5    # deployer chunks passed to LLM
top_k_initial        = 10   # candidates retrieved before reranking
snippet_chars_limit  = 400  # max chars per chunk in the prompt

[reranker]
# Cross-encoder model. Restart required to swap.
model_id = "BAAI/bge-reranker-base"

[reranker.confidence_thresholds]
# Buckets for the friendly confidence display ("strong" / "moderate" / "weak").
# Empirically calibrated on the 5-query test set in
# docs/test-passes/v4-qwen-3b-reranker-colab.md (when run): rerank scores >= 0.5
# corresponded to reliable cross-encoder rankings (Q3 REG 1.00, Q5 REG 0.85,
# Q2 DEP 0.87); scores < 0.15 corresponded to essentially random ordering
# (Q1 REG 0.03, Q4 REG 0.01).
strong   = 0.5
moderate = 0.15  # below moderate → "weak"

[ranking]
# How to combine BGE bi-encoder and cross-encoder rankings.
#   "rerank_only"  — cross-encoder fully replaces BGE order (default)
#   "rrf"          — Reciprocal Rank Fusion (blends both signals; tested and
#                    rejected — see docs/test-passes/v4-qwen-3b-ranking-
#                    strategies-comparison.md and docs/decisions.md)
#   "bge_only"     — disable reranker entirely (one-stage retrieval)
# Override via RANKING_STRATEGY env var.
strategy = "rerank_only"

[ranking.rrf]
# RRF smoothing constant (only relevant when strategy = "rrf").
# k=60 is the original-paper default.
k = 60

[llm]
# Default if MODEL_ID env var is not set. Local Mac CPU runs use the 1.5B
# default; Colab GPU runs override via env var to use larger models.
# Restart required to swap.
model_id = "Qwen/Qwen2.5-1.5B-Instruct"

[llm.generation]
do_sample          = false  # greedy decoding for determinism (see decisions.md)
max_new_tokens     = 550
repetition_penalty = 1.05

[output]
# Append the retrieval audit trail (friendly grounding summary + per-chunk
# detail) to the LLM output text. Hot-mutable.
show_evidence = true
